name: Check documentation

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test_documentation:
    name: Build documentation and run examples on Python 3.11
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python and IPOPT
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: "3.11"
          channels: conda-forge
          activate-environment: test-env
          environment-file: tests/environment.yml

      - name: Upgrade pip and build tools
        shell: bash -l {0}
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install MIMOSA, test and documentation dependencies
        shell: bash -l {0}
        run: |
          python -m pip install -e ".[docs,test]"

      - name: Check installed dependencies
        shell: bash -l {0}
        run: |
          python -m pip check

      - name: Build documentation strictly
        shell: bash -l {0}
        run: |
          python -m mkdocs build --strict

      - name: Run documentation examples
        shell: bash -l {0}
        run: |
          python -m pytest tests -m documentation
